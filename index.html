<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuickThinking Series Episode 10</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle,#0b0f2a,#020617);
  color:white;
  text-align:center;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.title {
  font-size:36px;
  color:#ffd700;
}

.option {
  display:block;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:1px solid #aaa;
  cursor:pointer;
}

.option:hover { background:#3949ab; }

.timer-bar {
  height:10px;
  background:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="title">NEET QTQS ⚡</div>

<p>
This episode has multiple Out Of Box questions with different time allotted...
</p>

<button onclick="startQuiz()" style="
padding: 15px 30px;
font-size: 18px;
background-color: #28a745;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;">
Start Test
</button>

<div id="app"></div>
</div>



<script>
function startQuiz() {
    document.querySelector("button").style.display = "none";
    loadQ();
}

const slides = [

{qImg:"Slide1.JPG", aImg:"Slide2.JPG", answer:1, time:12},
{qImg:"Slide3.JPG", aImg:"Slide4.JPG", answer:3, time:22},
{qImg:"Slide5.JPG", aImg:"Slide6.JPG", answer:3, time:20},
{qImg:"Slide7.JPG", aImg:"Slide8.JPG", answer:0, time:25},
{qImg:"Slide9.JPG", aImg:"Slide10.JPG", answer:3, time:30},
{qImg:"Slide11.JPG", aImg:"Slide12.JPG", answer:2, time:30},
{qImg:"Slide13.JPG", aImg:"Slide14.JPG", answer:0, time:30},
{qImg:"Slide15.JPG", aImg:"Slide16.JPG", answer:1, time:20},
{qImg:"Slide17.JPG", aImg:"Slide18.JPG", answer:1, time:30},
{qImg:"Slide10.JPG", aImg:"Slide20.JPG", answer:1, time:25},


];

let i=0, score=0, selected=null, timer, t;

function loadQ(){
if(i>=slides.length){ result(); return; }

selected=null;
let s = slides[i];

document.getElementById("app").innerHTML = `
<img src="${s.qImg}" style="width:100%; border-radius:15px;">

<div class="option" onclick="select(0)">Option A</div>
<div class="option" onclick="select(1)">Option B</div>
<div class="option" onclick="select(2)">Option C</div>
<div class="option" onclick="select(3)">Option D</div>

<div class="timer-bar" id="bar"></div>
<button onclick="submit()">Submit</button>
`;

start(s.time);
}

function select(x){
selected=x;
let ops=document.getElementsByClassName("option");
for(let o of ops) o.style.background="";
ops[x].style.background="#00c853";
}

function start(d){
clearInterval(timer);
t=d;

timer=setInterval(()=>{
t--;
document.getElementById("bar").style.width=(t/d)*100+"%";

if(t<=0){
clearInterval(timer);
submit();
}
},1000);
}

function submit(){
clearInterval(timer);
let s=slides[i];

if(selected===null){}
else if(selected===s.answer) score+=4;
else score-=1;

document.getElementById("app").innerHTML = `
<img src="${s.aImg}" style="width:100%;">
<button onclick="next()">Next</button>
`;
}

function next(){
i++;
loadQ();
}

function result(){
document.getElementById("app").innerHTML = `
<h1>Final Score: ${score}</h1>
<p>+4 / -1 / 0</p>
`;
}


</script>

</body>
</html>
